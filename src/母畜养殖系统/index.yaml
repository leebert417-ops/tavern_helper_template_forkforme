扩展字段:
  正则:
    - 正则名称: '[不发送]去除变量更新'
      id: remove-update-001
      启用: true
      查找表达式: /<update(?:variable)?>(?:(?!.*<\/update(?:variable)?>).*$|.*<\/update(?:variable)?>)/gsi
      内容: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[折叠]变量更新中'
      id: fold-updating-001
      启用: true
      查找表达式: /<update(?:variable)?>(?!.*<\/update(?:variable)?>)\s*(.*)\s*$/gsi
      内容: |-

        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      id: fold-complete-001
      启用: true
      查找表达式: /<update(?:variable)?>\s*(.*)\s*<\/update(?:variable)?>/gsi
      内容: |-

        <details>
        <summary>变量更新情况</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[界面]前端界面状态栏'
      id: ui-status-001
      启用: true
      查找表达式: <StatusPlaceHolderImpl\s*/>
      内容: |-
        ````
        <body>
        <script>
        $('body').load('https://testingcf.jsdelivr.net/gh/leebert417-ops/tavern_helper_template_forkforme@main/dist/母畜养殖系统/界面/状态栏/index.html')
        </script>
        </body>
        ````
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

