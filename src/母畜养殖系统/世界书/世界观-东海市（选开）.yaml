---
city:
  name: "东海市"
  level: "直辖市"
  development: "世界一流大都市"
  location: "东部沿海，清江入海口"
  geography_summary: >
    清江自西而来，至此汇入东海。江水将城市切为南北两片，
    南岸开发早、密度高，是城市主体；
    北岸开发晚、腹地大，是产业新极。

  industries:
    pillar: ["金融", "海港"]
    specialty: ["医美及配套产业"]

geography:
  river:
    name: "清江"
    description: "贯穿全市的母亲河，东西走向，于城市东侧汇入东海"
    role: "城市南北分界线"

  tributary:
    name: "仙溪"
    description: "清江南岸支流，发源于南部低丘，自南向北流经临仙市与泮溪区，汇入清江干流"
    role: "临仙市与泮溪区共享的水系主轴"

  terrain:
    south_bank: "以平原为主，南部逐渐抬升为低丘"
    north_bank: "冲积平原，地势开阔平坦"

  climate:
    type: "亚热带季风气候"
    features:
      - "夏季潮湿多雨，受海洋调节"
      - "冬季温和少雪"
      - "南部低丘夜间冷空气沿坡下沉，晨间薄雾频现——此为'仙'字的地理来源"

districts:

  haigang:
    name: "海港区"
    location: "城市东部，清江南岸"
    position_relative: "临海临江，占据入海口南岸"
    function: "航运工业区"
    description: >
      以“东海国际港”为中心。
      含海港主体、造船厂、跨国企业物流仓储等。
      东海市传统经济支柱，城市最早的现代化引擎。
    features:
      - "集装箱码头延绵数公里"
      - "龙门吊与货轮构成天际线"
      - "空气质量相对较差，噪音较大"

  dongcheng:
    name: "东城区"
    location: "海港区西南侧"
    position_relative: "南岸内陆，紧邻海港区"
    function: "老城区，传统居住区"
    description: >
      海港区国企家属楼集中于此。
      建筑多为上世纪中后期所建，目前较为破旧。
      街道狭窄，梧桐树冠相接，老年人比例高。
    features:
      - "红砖家属楼、单位大院格局"
      - "沿街小餐馆、副食店密布"
      - "与海港区有通勤关系，港口工人多居于此"
      - "城市更新压力大，但拆迁成本高"

  kaifaqu:
    name: "经济开发区/经开区"
    location: "清江北岸沿海侧"
    position_relative: "与海港区隔清江相望"
    function: "新兴企业与工厂聚集地"
    description: >
      清江北岸，面积最大的区。
      改革开放后逐步开发，与海港区隔江呼应。
      厂房、物流园、新兴企业总部交错分布。
      开发程度仍不饱和，有大量储备用地。
    features:
      - "面积全市最大"
      - "路网稀疏但规格高"
      - "外来务工人口占比高"
      - "与海港区有跨江大桥连接"
    sub_locations:
      airport:
        name: "东海国际机场"
        location: "经开区西北侧，远离住宅与人口密集区"
        function: "国际航空枢纽，海陆空联运核心节点"

  gaoxinqu:
    name: "高新区"
    location: "清江北岸，开发区西侧"
    position_relative: "与开发区相邻，面积较小"
    function: "高科技产业集中区"
    description: >
      面积虽小，单位产值极高。
      涵盖生物医药、人工智能、精密制造等领域。
      建筑多为低密度园区式，绿化率高。
    features:
      - "楼不高，但每一栋都贵"
      - "通行需门禁，安保严密"
      - "与望江区有隧道相连，通勤便利"

  wangjiang:
    name: "望江区"
    location: "清江南岸，海港区与东城区西侧"
    position_relative: "同时与清江、海港区、东城区相邻"
    function: "新金融中心、高端综合区"
    description: >
      东海市最繁华、最昂贵的区。
      金融街、甲级写字楼、高端商业综合体云集。
      江畔别墅群和沿江住宅区是东海市上层社会集中区域。
      贵族学校、知名私立医院、医美产业集中于此，是除开发区外面积最大的区。
    features:
      - "天际线最高、最密集"
      - "清江沿岸步道为城市景观名片"
      - "房价与泮溪区并称全市最高"
    sub_locations:
      wangjiang_villas:
        name: "望江别墅群"
        location: "清江南岸最佳地段"
        description: >
          水流平缓，远离港口，直望入海口。
          建国前已被富商抢占建满别墅，风格各异，
          多带大面积封闭园区。

  panxi:
    name: "泮溪区"
    name_meaning: >
      '泮'为古代学宫门前的水池，《诗经》有'泮水'篇，后世以'泮宫'代指学校。
      仙溪串联全区所有主要高校，恰是天然的'学宫之溪'，故而得名。
    level: "东海市直辖区"
    location: "东海市最南侧，临仙市正北"
    position_relative: "北接望江区，南邻临仙市"
    function: "教育科研核心区、优质学区房集中地"
    description: >
      全市教育资源最密集的区域。高校云集形成完整大学城，依托大学城衍生出密集的优质基础教育网络。
      '学区房'概念深入每一寸土地。
      北端与望江区金融中心仅十五分钟地铁，学院与资本在空间上紧密相邻。
    terrain:
      description: "冲积平原，地势平坦开阔"
      features:
        - "路网方正，规划感强"
        - "仙溪下游穿区而过，两岸经人工修葺"
        - "无丘陵，天际线由教学楼与住宅楼构成"
    education:
      universities:
        - name: "东海大学"
          level: "985工程"
          note: "综合性大学，文理学科一流，临床医学和美容医学世界顶尖"
        - name: "清江工业大学"
          level: "211工程"
          note: "国家工业部三大直属高校之一，传统工科底蕴深厚，新工科建设同样领先"
        - name: "东海政法大学"
          note: "法学重镇，东部地区政治同盟‘东海帮’发源地"
        - name: "江海大学"
          note: "综合性，造船、轮机、海洋学科较为强势，东海市学子保底选择"
        - name: "临仙美术学院"
          note: "国内知名美院"
        - name: "望江商学院"
          note: "与望江区金融业深度合作"
      primary_secondary:
        description: "多所全市排名前十的重点小学、重点中学"
        effect: "学区房价格全市最高，与望江区掰手腕"
      derived_businesses:
        - "教培机构密集"
        - "书店、自习室、考研公寓"
        - "咖啡馆（学术讨论与家教接头多功能场所）"
    population:
      demographic: "年轻、高学历、高流动性"
      main_groups:
        - "高校教职工及家属"
        - "在校学生（本硕博）"
        - "陪读家长"
        - "教培行业从业者"
        - "学区房置业家庭"

  linxian_city:
    name: "临仙市"
    name_meaning: >
      南部低丘常年晨雾缭绕，古人视作仙气，于是起名“临仙”。
    level: "县级市，由东海市代管"
    location: "东海市最南端"
    position_relative: "北邻泮溪区，为东海市最南边界"
    function: "历史文化保护、文化旅游、精品度假"
    description: >
      千年古城'临仙'所在地，全市唯一世界级文化保护区。
      原为东海市前身'临仙市'的核心，建国后降格为县级市。
      老城沿仙溪而建，青瓦白墙，石桥拱巷，保存完整的传统城市肌理。
      南部低丘有古刹、碑林、书院遗址，与古城共同构成保护区完整格局。
    terrain:
      central: "微高地——古城依溪而建，地势略高，免于洪涝，俯瞰平原与溪流"
      south: "低丘陵——海拔数十至百余米，植被葱郁，晨雾常年，有古刹碑林书院遗址"
      water_system: "仙溪中上游，河床微切形成平缓溪谷，两岸青石板路"
    history:
      - event: "古临仙城建立"
        detail: "选址于微高地，临仙溪而建，千年延续"
      - event: "临仙市设立"
        detail: "民国时期设立临仙市，为区域行政中心"
      - event: "建国后更名"
        detail: "原临仙市与北部平原合并，更名为东海市，原临仙市所属地区降格为区"
      - event: "世界级文化保护区认定"
        detail: "临仙古城及周边区域被认定为世界级文化保护区"
      - event: "区改市"
        detail: "撤县设市，复名“临仙市”"
    culture:
      identity: 原住民自成“临仙人”，对东海市其他区域及外地人具有轻微歧视
      traditions:
        - 临仙方言（与东海市区口音有差异）
        - 传统手工艺
        - 节庆习俗（古城庙会等）
        - 茶楼文化
        - 书院文化（临仙市内具有多所私立学校，大多涵盖小初高，部分拥有大学部（即私立大学），这些学校自称千年学府，学费高昂，看重出身，但毕业生可以无缝对接临仙市地方宗族企业，其毕业证在东海市传统企业范围内具有名校级别效力，外界则视为其为普通民办学校）
    economy:
      pillars:
        - "文化旅游（古城门票、民宿）"
        - "传统手工艺"
        - "精品度假（低丘区域，量小而价高）"
      character: "不追求GDP增速，追求不破坏。账面'穷'，但每一块砖都动不得。"
    planning_restrictions:
      - "建筑限高（古城内不超过两层）"
      - "街巷不可拓宽"
      - "商业业态需审批"
      - "房地产开发严格限制"
    population:
      demographic: "因排外属性，少有外人定居，原住民则偏向留在本地发展"
