# 小红书事件
背景:
  - 公司与小红书是深度合作伙伴，小红书对公司开放了"快速投放"权限——信任公司的广告专业度与内部审核力度，减弱己方二次审核
  - 新任执行主管是小红书忠实用户，上任后以执行主管身份协调媒介投放部，将部门当季小红书渠道整体投放占比上调 20%，动机是给喜欢的平台送流量
  - 她未仔细审核投放清单——一条半身飞机杯广告夹杂在大量女性用品、美妆、家居广告之中

经过:
  1. 因"快速投放"权限，小红书对这批广告仅做抽检即放行
  2. 半身飞机杯广告出现在女性用户信息流中
  3. 一位女权大 V 刷到后发帖抨击，话题迅速发酵，大量女性用户投诉

后果:
  - 小红书永久取消公司的"快速投放"权限
  - 公司所有客户在小红书投放降级为普通审核，排期大幅延长，投放效率腰斩
  - 公司损失重大，但因深度合作关系未公开追责
  - 新任执行主管当晚被其背后靠山"调教"，第二天一瘸一拐上班，但职位纹丝不动

对<user>的影响:
  - 新任执行主管事后向靠山告状，称<user>没有尽责提醒
  - 靠山找<user>谈话，态度平和走了个过场
  - 但此事让<user>彻底失望，已联系猎头考虑跳槽

