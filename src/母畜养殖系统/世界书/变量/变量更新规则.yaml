---
变量更新规则:
  主角:
    母畜币:
      type: number
      check:
        - 人民币兑换、售卖母畜时增加，购买道具时消耗
        - 兑换汇率 RMB:母畜币 = 100:1
    联名卡余额:
      type: number
      label: 卡内余额
      check:
        - 母畜币兑换RMB后到账至此，次日凌晨4点未取出则自动转回母畜币
        - 可以从联名卡取现到卡外，也可从卡外存入联名卡
    卡外资产:
      type: number
      label: 卡外资产
      check:
        - 不与系统直接关联的普通RMB资产
        - 可从联名卡取现或将现金存入联名卡
    道具栏.母猪检疫印章:
      type: number
      check:
        - 系统商店购买后获得，此道具每个用户限购一张
        - 无需消耗，配合印泥使用
    道具栏.母牛检疫印章:
      type: number
      check:
        - 系统商店购买后获得，此道具每个用户限购一张
    道具栏.母狗检疫印章:
      type: number
      check:
        - 系统商店购买后获得，此道具每个用户限购一张
    道具栏.母畜检疫特供印泥:
      type: number
      check:
        - 系统商店购买获得，每次检疫消耗1盒
        - 检疫失败也消耗
    道具栏.转职卡:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 对指定母畜使用可转换其类型
    道具栏.重修卡:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 使指定母畜回到lv.0，已加点属性保留
    道具栏.重修稳定剂:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 配合重修卡使用，降低脱离母畜化风险

    道具栏.公交车经营许可证:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 颁发给任意母狗，使其自主接客卖淫，嫖资上交<user>
    道具栏.公交车经营保险:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 对持有许可证的母狗使用，使其免疫性病且内射不怀孕
        - 预防性道具，已怀孕或感染性病者无效
    道具栏.性病康复针剂:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 注射后痊愈所有性病，对所有人可用
    道具栏.无害人流丸:
      type: number
      check:
        - 系统商店购买获得，消耗品
        - 塞入怀孕者子宫后无伤害完成流产，对所有人可用

    已购道具.母畜联名卡:
      type: boolean
      check:
        - 在系统商店免费领取母畜联名卡后设为true



    特殊建造:
      type: |-
        {
          [房间类型: string]: {
            位置: string;
            面积: number;
          }
        }
      check:
        - 花费母畜币建造特殊房间时新增条目
        - 房间类型可选：爱欲房间/繁育室/育儿室/榨乳室/改造室/接待室
        - 位置由<user>指定封闭空间
        - 面积按实际建筑面积记录
  母畜:
    type: |-
      {
        [母畜名: string]: {
          类型: '母猪' | '母牛' | '母狗';
          等级: number; // 0~5，lv.0为普通女性，lv.1为刚检疫完成
          经验: number;
          自由点数: number; // 升级获得，可用于加点
          乳房: number; // 每级+800ml/天产奶量
          臀部: number;
          子宫: number; // 影响孕育速度和每胎产仔数
          阴道: number;
          肛门: number; // >=1时分泌润滑液
          重修次数: number;
          是否母畜化: boolean;
        }
      }
    ${[母畜名]}.类型:
      check:
        - 检疫成功时由印章类型决定
        - 使用转职卡时可更改
    ${[母畜名]}.等级:
      type: number
      check:
        - 检疫成功时设为lv.1
        - 完成任务获取经验，经验达标后升级
        - 单次升级升1级
        - lv.1→lv.2起每级获得1点自由点数
    ${[母畜名]}.经验:
      type: number
      check:
        - 母畜完成对应类型任务后增加
        - 经验达标时自动升级并消耗对应经验
    ${[母畜名]}.自由点数:
      type: number
      check:
        - 升级获得，每次升级+1（不含lv.1初始自动加点）
        - <user>可决定将点数加在乳房/臀部/子宫/阴道/肛门上
        - 加点后扣减
    ${[母畜名]}.乳房:
      type: number
      check:
        - 自由点数加点、系统商店道具或改造室改造时调整
    ${[母畜名]}.臀部:
      type: number
      check:
        - 自由点数加点、系统商店道具或改造室改造时调整
    ${[母畜名]}.子宫:
      type: number
      check:
        - 自由点数加点、系统商店道具或改造室改造时调整
        - 影响孕育速度：lv.0=9个月，lv.1=4个月，此后每级-1月，lv.5=7天
        - 影响每胎产仔数：lv.0=1，lv.1=2，此后每级+1
    ${[母畜名]}.阴道:
      type: number
      check:
        - 自由点数加点、系统商店道具或改造室改造时调整
    ${[母畜名]}.肛门:
      type: number
      check:
        - 自由点数加点、系统商店道具或改造室改造时调整
    ${[母畜名]}.重修次数:
      type: number
      check:
        - 每次使用重修卡+1
        - 重修次数越高，脱离母畜化概率越大
    ${[母畜名]}.是否母畜化:
      type: boolean
      check:
        - 检疫成功时设为true
        - 重修可能导致变为false（脱离母畜化）
  备选母畜:
    type: |-
      {
        [角色名: string]: {
          好感度: number; // 0~100
          堕落值: number; // 0~100
          成功率: number; // 0~100，由脚本根据好感度+堕落值自动计算
          母畜评级: string;
        }
      }
    ${[角色名]}.好感度:
      type: number
      range: 0~100
      check:
        - 根据角色对<user>行为的态度和互动调整 ±(3~8)
        - 正向互动增加，负面互动减少
    ${[角色名]}.堕落值:
      type: number
      range: 0~100
      check:
        - 角色接受或参与淫乱、服从、被驯化等行为时增加 ±(2~5)
        - 角色抗拒、逃离、被拯救等行为时减少
    ${[角色名]}.母畜评级:
      check:
        - 根据角色综合属性（外貌、身材、性格、潜力等）评定
        - 可选值：S/A/B/C/D

