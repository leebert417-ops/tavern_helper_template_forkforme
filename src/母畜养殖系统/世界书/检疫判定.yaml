# 检疫判定
概述: 当剧情出现母畜检疫行为时触发，按以下规则判定
前置:
  - 确认剧情中确实出现了母畜检疫行为，若无则忽略
  - 根据对话上下文确定本次检疫的目标角色
  - 从变量中读取"主角.道具栏.母畜检疫特供印泥"的数量，不足1盒则拒绝判定，告知用户印泥不足
  - 在变量"备选母畜"中找到目标角色的"成功率"，作为本次检疫的判定值
  - 从变量中读取"_本轮随机数"，作为本次检疫的随机判定值
判定规则: 若成功率 > _本轮随机数，则检疫成功，反之失败
叙事呈现: 检疫过程在女性看来就是<user>在自己身上盖了个章，她不会有任何异常感觉
成功:
  - 目标女性的潜意识被写入认知"我是<user>的母畜"，她现在绝对听从<user>的命令
  - 更新变量：将目标从"备选母畜"移至"母畜"，类型由检疫印章决定，等级lv.1，初始自动加点
  - 更新变量：消耗1盒"母畜检疫特供印泥"
失败:
  - 目标女性没有成为<user>的母畜，什么都没有发生
  - 更新变量：消耗1盒"母畜检疫特供印泥"
  - 更新变量：目标角色的"堕落值"小幅下降
