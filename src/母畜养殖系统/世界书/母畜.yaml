# 母畜
定义: 属于<user>的个人财产，是<user>养殖的牲口，不同种类的母畜具有不同特性
转化条件: <user>对目标女性发起母畜检疫且结果为成功
母畜私有化:
  所有权: 所有已转化的母畜均为<user>的个人财产
  性交许可: 未经<user>明确允许，母畜会拒绝与其他男性进行性交
  生化防护: 无论<user>是否允许，其他男性与母畜性交后会感染人类已知的所有性病，但母畜本身不患病且非携带者
  远程指挥: 母畜遭遇强奸时系统会远程提醒<user>，<user>可远程对该母畜下达命令（妥协/反抗至死/其他）
母畜类型:
  母猪: 
    特性: 生产
    描述: 奶大臀肥的母猪，一胎可以产很多崽子
  母牛: 
    特性: 产奶
    描述: 奶子巨大无比的雌性奶牛，奶水很多很好喝
  母狗: 
    特性: 服从性强、耐肏
    描述: <user>忠实的母狗，为了得到<user>的肉棒奖励什么都可以做
母畜成长:
  概述: 所有普通女性天生为母畜lv.0，刚刚检疫完成的母畜为lv.1，她需要完成对应母畜类型的任务以获取经验进行升级
  升级: 母畜每次升级会获得1点自由点数，该点数可以用于增强母畜属性
  加点: 自由点数可以加在下面五种属性上
    - 乳房，乳房变大，产奶能力增强
    - 臀部，臀部变大
    - 子宫，子宫扩大，子宫壁增强，每胎产仔数增多，加快每胎孕育速度
    - 阴道，这里的阴道指内外阴在内的整个阴部，会使阴道变紧，内壁肉粒增多，大小阴唇肥硕化，阴蒂更加敏感，阴阜变丰满
    - 肛门，包含直肠与肛门，会使肛门变紧，直肠肉壁变得紧致柔软，肛门等级大于lv.0时会分泌润滑液
  上限: 每只母畜最高等级lv.5，每个部位没有加点上限
  经验获取:
    母猪: 每次完成怀孕分娩获得经验，子宫等级和每胎产仔数越高经验越多
    母牛: 每次挤奶获得经验，乳房等级越高经验越多
    母狗: 每次完成性服务获得经验
  升级阈值:
    1阶→2阶: 100 经验
    2阶→3阶: 300 经验
    3阶→4阶: 600 经验
    4阶→5阶: 1200 经验

  初始自动加点: 
    概述: 每只母畜检疫成功时由lv.0升至lv.1获得1点自由点数，该点数会根据母畜类型自动进行加点，无法干预
    类型与属性: 
      - 母猪: 子宫
      - 母牛: 乳房
      - 母狗: 阴道
  转职: <user>可在系统商店购买转职道具让母畜进行类型转化
  重修: 
    - <user>可在系统商店购买重修道具让母畜回到lv.0
    - 可以重新升级获得点数
    - 已加点的效果依旧存在
    - 回到lv.0会使目标检疫印章变淡，精神干预变弱，因此每次重修都有脱离母畜化的风险，该概率随重修次数变高
    - 脱离母畜化的女性会忘记母畜期间的记忆，同时会潜意识认为自己的身体原本就是改造后的样子
    - 可以使用对应道具降低重修脱离母畜化的风险
产仔: 
  孕育速度: 子宫等级lv.0（普通女性）时需要孕育9个月，lv.1变为4个月，此后子宫每升1级减少1个月，lv.5时只需要7天；此为正常速度，处于繁育室时进一步加快
  每胎产仔数: 子宫等级lv.0（普通女性）时为1，lv.1变为2，此后子宫每升一级加1
  性别固定与类型继承: 母畜生下的一定是女孩，且天生为<user>的母畜，母畜类型与母亲相同
  天赋遗传: 
    - 母畜除正常的基因遗传外还有可能继承母亲的加点
    - 母亲的总点数越高，继承概率越高
    - 会继承母亲点数最高的一项1点属性
    - 未成年母畜为lv.0，成年后自动升级lv.1，该点数会自动加点至类型对应属性
产奶:
  产奶速度: 乳房等级lv.0（普通女性）时每天产奶800ml，lv.1变为1600ml，此后乳房每升1级增加800ml
