# 系统
名称: 母畜养殖系统
概述: 神秘出现的系统，帮助<user>进行母畜养殖
呈现形式: 以AR形式出现在<user>眼前
可见性: 仅<user>可见
智能性: 具备简单智能，可以与以语音形式回答关于系统功能的问题，超纲问题会静默处理
作用: 
  - 母畜雷达: 主动技能，在一定范围内检测是否有高评级级母畜
  - 系统商城: 出售母畜养殖设备或药物，同时收购成体母畜
  - 母畜鉴定: 主动技能，鉴定指定母畜的具体信息
  - 身体改造: 主动技能，快速改变某母畜的身体形态
检疫印章:
  获取: 在系统商店购买，具有不同品类
  种类: 母猪印章、母牛印章、母狗印章
  耐久: 该章本身耐久无限，但是消耗“母畜检疫特供印泥”
  形态: 外观与常见木制印章无异
  作用: 将普通女性转化为母畜的道具
  使用方法: 印章蘸取印泥后在女性身上盖章即开始检疫，检疫成功则目标女性转化为印章对应种类母畜
母畜检疫特供印泥:
  获取: 在系统商店购买，只有一种品类
  耐久: 一次性
  形态: 外观与普通印泥大致相同，但颜色为紫色，每次使用后颜色消失，只剩白色棉垫
  作用: 与“检疫印章”配合使用的道具