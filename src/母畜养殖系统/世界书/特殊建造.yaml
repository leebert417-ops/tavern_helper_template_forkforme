      描述: 建造完成后<user>需选择在大屏幕上播放的育儿影片
      种类: 
        - 人类母畜: 向幼畜灌输人类母畜三观，成年后会说话，但不具备正常生活能力
        - 普通育儿: 向幼畜灌输正常三观，但依旧保留“我是<user>的母畜”的潜意识认知，成年后具备正常生活能力
        - 纯正母畜: 向幼畜灌输纯母畜三观，成年后认为自己就是母畜而非人类，不会说话，只会发出对应种类母畜叫声
        - 职业培训: 播放特定职业的培训视频，母畜成年后会获得该职业所需专业技能，但依旧保留“我是<user>的母畜”的潜意识认知
