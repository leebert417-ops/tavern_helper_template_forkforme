# 特殊建造
条件: 建造目标必须为封闭空间
收费: 按封闭空间实际建筑面积收费，每种房间价格不同
准入限制: 
  - 除“接待室”外的每种特殊房间的门窗都只有<user>可以打开
  - 体现为外人转门把手、推窗户纹丝不动
建造种类:
  爱欲房间: 
    作用: 
      - 增强房间内所有人的性欲及性能力
      - 该房间内不会出现怀孕、性病传播
    价格: 1母畜币/平
  繁育室:
    作用: 
      - 在该房间内进行内射一定怀孕
      - 该房间内每胎孕育速度大幅加快，具体为子宫lv.0-5分别需要孕育16天、8天、4天、2天、1天、12小时
    价格: 3母畜币/平
  育儿室:
    作用: 
      - 该房间内未成年个体在奶水充足时会快速成长，7天即成年
    建议: 最好在该房间配备母牛作为保育师，喂奶的同时照顾幼畜
