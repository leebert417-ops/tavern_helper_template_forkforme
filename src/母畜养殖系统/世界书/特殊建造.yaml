  改造室:
    作用: 
      - 该房间内因身体改造造成的创伤会在术后半小时内完全恢复
      - 该改造不会提升对应属性，只是外观变化
    工具: 建造该房间不提供用于身体改造的器材，需自行购置
    限制: 该房间不提供任何立即生效的规则式身体改造，一切改造需手动进行
