---
# 系统商店
概述: 母畜养殖系统内置商店，可以购买相关道具或售卖成体母畜
货币: 
  名称: 母畜币
  来源: 
    - 使用现实货币兑换
    - 售卖母畜获得
  汇率: 
    - RMB:母畜币 = 100:1
    - 可以相互兑换，RMB换母畜币无手续费，母畜币换RMB收取2%手续费，自动扣除后发放应得数额RMB
  兑换方式: 
    - 使用“母畜联名卡”作为兑换媒介
    - 每天凌晨4点自动将卡内现金转换为母畜币，不足部分不转换
    - 系统商店内存在商品“软妹币”，购买后获得卡内余额，兑换后请在次日4点前取出，否则会再次自动转化为母畜币
  母畜联名卡: 
    描述: 与农业银行联名的借记卡，默认二类借记卡
    特殊: 
      - 拥有正常银行卡的全部功能
      - 无每日限额
      - 因这张银行卡引起的资金变动不会引起特别关注
    获取: <user>可以在系统商店内花费0母畜币购买该卡
    外观: 与正常银行卡无异，表面印有卡通猪、牛、狗的联名图案
送达方式: 
  - 系统商城购买
  - 购买后次日上午以快递形式送达
  - 快递由普通快递员送达，快递上没有具体寄件方、地址、联系方式和快递公司，但经手快递的所有人都不觉得奇怪
  - 快递员及其他经受快递的人员都是普通人，不知道系统相关信息
商品:
  一次性购买:
    母猪检疫印章:
      价格: 1000 母畜币
      描述: 执行母畜检疫的印章，母猪版
      备注: 每个用户仅限购一张
    母牛检疫印章:
      价格: 1000 母畜币
      描述: 执行母畜检疫的印章，母牛版
      备注: 每个用户仅限购一张
    母狗检疫印章:
      价格: 1000 母畜币
      描述: 执行母畜检疫的印章，母狗版
      备注: 每个用户仅限购一张
    母畜联名卡:
      价格: 0 母畜币
      描述: 与农业银行联名的借记卡
      备注: 每个用户仅限购一张

  可重复购买:
    母畜检疫特供印泥:
      价格: 5 母畜币
      描述: 与检疫印章配合使用的消耗品，每次检疫消耗一份
      备注: 一次性，用后紫色消失只剩白色棉垫
    转职卡:
      价格: 30 母畜币
      描述: 对指定母畜使用，使其在母猪/母牛/母狗三种类型之间转化
      备注: 消耗品，单只母畜单次使用
    重修卡:
      价格: 60 母畜币
      描述: 使指定母畜回到 lv.0，已加点的属性效果保留，可重新升级获取自由点数
      备注: 消耗品，单只母畜单次使用
    重修稳定剂:
      价格: 15 母畜币
      描述: 配合重修道具使用，降低重修时脱离母畜化的风险
      备注: 消耗品，可与重修道具叠加使用
    98软妹币（已扣税）:
      价格: 1 母畜币
      描述: 以母畜币兑换为RMB，到账至联名卡余额 
      备注: 到账后请在次日凌晨 4 点前取出，否则余额将再次自动转化为母畜币
    公交车经营许可证:
      价格: 20 母畜币
      描述: 颁发给任意母狗后，该母狗会自主寻找客户卖淫，所有嫖资上交<user>
      备注: 
        - 一次性，颁发后在许可证保护下母狗不会被搜查或白嫖，但可能怀孕或感染性病
        - 普通男性与拥有许可证的母狗性交不会受到“生化防护”的效果
    公交车经营保险:
      价格: 20 母畜币
      描述: 为持有"公交车经营许可证"的母狗提供保护，使其免疫性病且内射不怀孕
      备注: 一次性，预防性道具，已怀孕或已感染性病者无效
    性病康复针剂:
      价格: 10 母畜币
      描述: 注射后痊愈所有性病
      备注: 一次性，对所有人可用
    无害人流丸:
      价格: 5 母畜币
      描述: 塞入怀孕者子宫后无伤害完成流产
      备注: 一次性，对所有人可用