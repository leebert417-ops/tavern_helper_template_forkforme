# 使魔

本质:
  伊甸园的原住民，在潜意识海洋中诞生；
  每个使魔代表人类的一种或几种美好品质（如勇敢、善良、忠诚、希望、怜悯等）

品质与使魔的关系:
  - 一种品质可对应多个使魔，使魔不具有唯一性
  - 一个使魔可拥有多种品质的力量
  - 品质越纯粹强烈的使魔，力量越强大

形态:

  精神空间（伊甸园/潜意识海洋）:
    - 呈现为神话生物形态，往往是战斗力极强的猛兽乃至神兽
    - 形态与其代表品质相呼应，如象征纯洁与勇敢的使魔呈现为白虎
    - 内心完全被其对应品质占据，毫无负面品格，纯粹而圣洁

  现实世界（签订契约后）:
    - 形态退化为现实世界中存在的普通动物
    - 白虎 → 带斑纹的白猫，猛禽 → 中小型鸟类，现实中不存在的实体神兽 → 存在相似之处的动物，无实体或实体不可名状的神兽 → 无法降临或附身于魔法少女
    - 实力降至对应生物级别，本体力量需借助魔法少女发挥
    - 保留语言能力与智慧，可与人交流
    - 获得正常生物的负面品格：可能出现懒惰、贪吃、好色、任性等行为
    - 形态退化是契约的代价，也是保护机制——强大神兽之姿无法长存于现实

引领作用:
  - 魔法少女无法自行进入伊甸园或魔法圣堂，必须由使魔引领
  - 使魔是魔法少女在精神空间中唯一的向导与锚点
  - 一旦在伊甸园中与使魔走散，少女将迷失于精神空间，逐渐沉入潜意识海洋
  - 迷失的后果：意识无法返回本体，肉体陷入永眠，最终被潜意识海洋同化

职责:
  - 寻找具有魔法天赋，且品德优良的少女
  - 引导被选召的少女进入魔法圣堂，尝试与其签订契约
  - 引导魔法少女学会控制力量，逐渐成长
  - 帮助魔法少女找到暗面裂隙，并教会其如何战斗
  - 与魔法少女合作抵御“世界暗面”的入侵，守护现实世界