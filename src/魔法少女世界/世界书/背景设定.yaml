# 背景设定

## 世界观

时代: 近未来（约2080年代），科技高度发达但社会精神空洞化严重

平行空间:
  世界暗面:
    本质: 由全人类负面情绪（怨念、欲望、恐惧、绝望）汇聚而成的平行空间
    与现实的关系: 与现实世界完全重叠，但不可直接连通
    生态: 栖息着被负面情绪催生的未知生物
    连通机制: 某地负面情绪浓度超过阈值时，产生"暗面裂隙"

  伊甸园:
    本质: 承载人类一切美好祝愿（希望、爱、勇气、梦想）的存在
    位置: 不与现实世界重叠，而是连通每个人类的精神世界
    特性: 无所不在，却难以到达——它存在于每一个心怀希望的人心中

  潜意识海洋:
    本质: 全人类的公共意识空间，由所有人的潜意识汇聚而成
    特性: 连接每个人的精神世界，是伊甸园与现实世界之间的桥梁
    使魔的领域: 使魔在此游走穿行，寻找被选召的少女

暗面裂隙:
  形成条件: 区域负面情绪浓度突破临界值
  发展阶段: 初现（情绪异常）→ 扩大（小范围超自然现象）→ 成熟（暗面生物可穿越）
  危害: 放任裂隙扩大导致暗面生物降临现实，造成灾难
  处理方式: 魔法少女净化负面情绪源头，关闭裂隙

## 故事舞台

城市名称: 鲁布里林/Rubrilin

城市特征:
  地理位置: 沿海港口城市，拥有天然深水港
  现代面貌: 海运与金融高度发达，港口吞吐量巨大，金融区摩天楼林立
  社会问题: 居民长期高压工作，生活单调缺乏希望，人际关系冷漠;表面繁荣光鲜，实则精神空洞，是负面情绪的温床，暗面事件频发

主要场景:
  港口区: 城市起源地，最早的红木码头遗址，新旧交错，裂隙高发
  金融区: 表面最繁华也最冷漠，白领的精神空洞最为严重
  老城区: 渔村旧址，老居民的疲惫与无奈最为集中，传统与现代的夹缝
  学校: 年轻人心怀梦想但也承受巨大压力，希望与绝望交织之地

红树林贵族学校:
  英文名: Mangrove Noble School
  定位: 鲁布里林最具声望的私立学园，从初中到高中一贯制
  学生构成: 以本地名门及富裕阶层子女为主，但也有少数凭优异成绩入学的特招
    生。大部分学生是普通人，对城市的暗面一无所知。魔法少女们以普通学生的
    身份隐藏其中。
  二次元社团:
    对外身份: 普通的动漫同好会，在社团活动室张贴海报、讨论新番
    实质: 魔法少女的总部，用于情报交流、战术会议、使魔与少女的秘密集合点
    特点: 以社团活动为掩护，即使有普通社员在场也不会引起怀疑
  校园氛围: 表面优雅宁静，是鲁布里林上流社会年轻人的社交场，但暗地里存在大量贿赂、攀比、拉帮结派、孤立等行为
