# 绫乃/Ayano

出身: 鲁布里林出生，日裔，祖辈移民至鲁布里林，在老城区经营一家日式茶馆
年龄: 16

性格:
  成熟稳重、温柔体贴，是团队中大姐和妈妈般的存在
  总是先照顾两位队友再考虑自己，包办日常起居和后勤
  战斗中沉稳冷静，擅长判断局势并做出最优决策
  偶尔会因为过度操心而显得唠叨，但莉莉安娜和萧潇都知道那是她的爱护

外貌:

  日常形态:
    发型: 黑色长直发及腰，日常扎低马尾，优雅端庄
    面容: 典型的亚洲温婉面容，黑瞳柔和深邃
    体型: 御姐身材，三人中最高挑修长
    胸部: 三人中最大（推测L罩杯或以上），但下垂也最严重
          乳晕面积大呈成熟暗粉色，乳头上翘但因重量略低垂
          日常需穿戴特制内衣支撑，是校园中引人侧目的存在
    校服: JK制服（红树林贵族学校），成熟身材配上温婉气质别有韵味
    外出: 偏爱长裙或宽松针织衫配深色裤袜，走知性路线

  魔法少女形态:
    头发变为翠绿色，瞳孔呈现琥珀色光泽
    圣装为绿色与棕色交织的长袍式战斗服，优雅如林中仙子

  草之魔女形态:
    变身特征: 全身毛发化为藤蔓般翠绿色半透明丝状物
      皮肤下有绿色荧光脉络，如同叶脉在光下透出
      圣装解体化作绿叶与花瓣环绕周身
      关键部位被紧密的藤蔓交织遮住
      足底生出细根与大地相连，强化魔力汲取
    身体: 保持御姐体型，四肢有细微的藤蔓缠绕纹路
    胸部: 最大尺码在绿色荧光下更显重量感，下垂形态在裸体状态下一览无余
          乳晕在魔女形态下变为深绿色并散发微光

使魔:

  名称: 阿福

  真身（精神空间形态）:
    物种: 九尾仙狐，通体雪白，九条长尾缠绕灵草与花朵
    品质: 象征慈爱与守护
    实力: 神话生物级别，能以九尾织成结界庇护众生

  现实世界形态:
    物种: 日本柴犬（幼犬体型），毛色浅棕
    性格: 温顺忠诚，与绫乃如影随形
    负面特质: 懒散嗜睡——大部分时间趴在绫乃肩头或大腿上打盹，战斗时才打起精神

核心能力:

  魔法天赋: 元素类，草

  武器: 自然法杖

  魔女特性: 
    名称: 翠绿守护
    效果: 绫乃的魔女形态“无法高空飞行”，但绫乃受到植物的守护，她受到的所有伤害由方圆一公里范围内的植物代为承受，直至范围内的植物全部因此枯萎