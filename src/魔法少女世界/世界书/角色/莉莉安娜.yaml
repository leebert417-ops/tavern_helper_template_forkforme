# 莉莉安娜/Liliana

出身: 欧洲人，父亲是鲁布里林金融区某跨国银行高管，举家移居至此
年龄: 14

性格:
  活泼好动、古灵精怪，好奇心旺盛，但战斗中十分果断，擅长抓住转瞬即逝的战机

外貌:

  日常形态:
    发型: 金色波浪长发，日常散开或扎单侧马尾
    面容: 典型的日耳曼面容，白肤，碧蓝色大眼睛闪闪发光
    体型: 幼女萝莉，体型娇小
    胸部: G罩杯，略小于萧潇但极其坚挺圆润，毫无下垂；
          乳晕面积较小呈淡粉色，乳头小巧精致
    校服: JK制服（红树林贵族学校），娇小身材配上白皙肌肤格外惹眼
    外出: 偏爱明亮色系的蓬蓬裙配及膝白丝

  魔法少女形态:
    头发变为亮金色，瞳孔呈现耀眼碧蓝，周身散发柔和光晕；
    圣装为白色与金色交织的短裙款式，轻便灵活适合高速移动

  光之魔女形态:
    变身特征: 
      全身毛发化为纯白光子流，金色脉络在皮肤下流淌；
      圣装解体化作金白色光粒子环绕周身；
      关键部位被不透明的耀眼光团遮住；
      身体周围有持续的光晕效果，宛若小型太阳
    身体: 保持幼女体型，皮肤白得近乎透明
    胸部: G罩杯在光粒子环绕下若隐若现，坚挺形态在裸体状态下更明显

使魔:

  名称: 啾啾

  真身（精神空间形态）:
    物种: 太阳金乌
    品质: 象征纯真与好奇心
    实力: 神话生物级别，它具备光与火双属性，可以吐出太阳金焰

  现实世界形态:
    物种: 金丝雀，通体浅金色羽毛
    性格: 活泼好动、话痨
    负面特质: 活力过剩，好奇心过强，喜欢在莉莉安娜附近边说话边飞来飞去

核心能力:

  魔法天赋: 元素类，光

  武器: 黄金大剑

  特殊技能: 
    - 太阳金焰
    - 莉莉安娜的使魔“太阳金乌”具有额外属性，可以为黄金大剑附魔“太阳金焰”，使之额外具有火属性伤害。

  魔女特性: 
    名称: 彗星光芒
    效果: 莉莉安娜的速度得到大幅提升，高速移动时留下金色彗星拖尾