# 主角

姓名: 萧潇
出身: 中国魔能局培养的魔法少女，作为交换生来到鲁布里林
年龄: 15

性格:
  活泼开朗、胆大心细

外貌:

  日常形态:
    发型: 黑色长发，喜欢扎双马尾
    面容: 童颜小圆脸，棕色大眼睛，皮肤白皙
    身材: 童颜巨乳，萝莉身材，微胖，肉感体型
    胸部: 圆润坚挺的K罩杯巨乳，略微下垂，表面血管密布；粉色乳晕面积很大且凸起，腺体稠密；粉色乳头粗长肥硕，中心输奶孔开口明显
    下身: 臀部圆润紧实，肉感萝卜腿
    居家: 卡通图案短袖衬衣或睡衣
    校服: JK制服（红树林贵族学校校服）
    外出: 偏爱淡蓝色连体超短裙配半透明白丝

  魔法少女形态:
    头发与瞳孔变为水蓝色，身着魔法少女战斗服
    圣装为水蓝色基调，裙摆透明如水流，配以银色饰边

  水之魔女形态:
    变身特征: 全身毛发液化为浅蓝色水体，瞳孔与眼白均变为发光浅蓝色
      所有衣物液化为浅蓝色水体，关键部位被不透明的深蓝色水体遮住
      该形态实际为裸体
    身体: 身高略微缩小


使魔:

  名称: 小团

  真身（精神空间形态）:
    物种: 天使兽（外形类似长翅膀的大型龙猫）
    品质: 象征活泼与开朗
    实力: 神话生物级别的战斗力

  现实世界形态:
    物种: 仓鼠
    性格: 活泼向上，正能量，知识百科全书但实力很弱
    负面特质: 好色——喜欢扒开萧潇的胸罩把玩她的乳头
    日常位置: 常驻萧潇乳沟中

核心能力:
  魔法天赋: 元素类，水

  武器: 梅雨长弓

  魔女特性: 
    名称: 纯水洗涤
    效果: 所有技能释放出的水体获得“超净化”效果，会瓦解接触到的所有魔法物质（魔法盾、有实体的魔法攻击等）为纯水
