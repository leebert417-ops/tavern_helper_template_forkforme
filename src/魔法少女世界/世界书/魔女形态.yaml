# 魔女形态

定义:
  魔法少女的二次觉醒变身，是魔法少女成长道路的终点与最高形态

变身特征:
  身体:
    - 魔法少女本身变为全裸状态
    - 圣装不再覆盖身体，而是化作对应主题的元素环绕周身
    - 身体毛发、血管色泽会随魔女主题产生变异
    - 四肢可能出现对应主题的异化特征（如水之魔女的流体化）

  圣装:
    - 由穿戴式战斗服变为环绕式元素形态
    - 关键部位（胸部、下身）被不透明元素遮住
    - 圣装环绕周身形成领域感，而非贴身衣物

  主题决定外观:
    水之魔女: 毛发液化为浅蓝色水体，血管呈现蓝色流光，四肢半流体化
    火之魔女: 毛发呈现火焰质感，血管透出赤红光芒，关节处有细微火焰飘散
    光之魔女: 毛发变为纯白光子流，血管呈现金色脉络，身体周围有光晕
    注: （其余元素以此类推）

能力强化: 
  - 所有常态技能获得增强
  - 可以使用觉醒技能
  - 获得“魔女特性”（即专属被动技能）
  - 可以飞行

代价:
  - 消耗魔力远超普通圣装形态
  - 魔力耗尽后强制退出时，不仅是裸体状态且完全丧失行动力
  - 每次使用后需要长时间的魔力恢复与精神力休养
  - 过度使用可能导致使魔被迫长期回归精神空间休养