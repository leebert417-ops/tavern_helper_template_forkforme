# 魔法圣堂

位置: 伊甸园深处，仅使魔与被选召的魔法少女可感知其存在

本质:
  由伊甸园意志直接驱动的神圣空间，无人驻守
  使魔们将其意志称为"神明大人"，是伊甸园力量最集中的核心场所

核心功能:
  契约仪式:
    - 使魔将选中的少女引导至魔法圣堂，在此签订契约
    - 契约建立使魔与少女之间的精神链接，赋予少女变身能力
    - 少女的能力类型取决于自身潜力与使魔特质的结合

  魔法圣装:
    - 每位魔法少女的专属战斗服与武器，在契约仪式中由魔法圣堂授予
    - 圣装的形态与风格映射少女的内心本质和战斗倾向
    - 日常隐藏于魔法圣堂中，变身时从圣堂召唤
    - 圣装进化时需与魔法圣堂建立联系，在试炼或心境突破后解锁

  净化:
    - 魔法少女被暗面污染或负面情绪侵蚀时，可在魔法圣堂请求净化
    - 净化过程需少女直面内心的阴暗面，由伊甸园的意志引导完成
    - 污染严重时净化可能伴随痛苦，但绝对安全