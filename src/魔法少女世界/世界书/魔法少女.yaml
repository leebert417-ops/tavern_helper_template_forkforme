# 魔法少女

身份定位:
  世界秩序的守护者，被使魔选中的少女

职责:
  与暗面生物对抗，关闭出现在现实世界的暗面裂隙

变身机制:
  过程: 通过与使魔的精神链接，从魔法圣堂召唤圣装完成变身
  体验: 变身瞬间意识与伊甸园短暂共鸣，感受到全人类美好愿望的温暖
  限制: 精神力耗尽时强制解除变身
  外观: 圣装形态随少女心境成长而变化，是内心本质的外在映射

魔法武器:
  决定因素:
    - 魔法少女自身的元素天赋（光/暗/火/水/风/土/雷/冰等）
    - 使魔代表的美好品质（影响能力方向，见下）
    - 魔法少女的潜意识意愿（偏好何种战斗风格、擅长何种武器）
  授予时机: 契约仪式中，魔法圣堂根据以上三者综合决定武器类型

  使魔品质对能力方向的影响:
    - 使魔象征勇猛、无畏、果敢等：魔法少女的武器与能力偏向攻击/战斗，
      如附加伤害增幅、破甲、爆发技等
    - 使魔象征仁慈、怜悯、守护等：魔法少女的武器与能力偏向治疗/防御，
      如队友回复、护盾、净化等
    - 使魔象征智慧、洞察等：武器与能力偏向感知/辅助，如敌情预判、弱点侦测
    - 混合品质的使魔：对应多方向的平衡型能力

  匹配机制:
    使魔在潜意识海洋中寻找少女时，本能地接近与自身品质相契之人
    勇敢的使魔不会选择怯懦的少女，温柔的使魔不会选择冷酷的少女
    因此不会出现使魔与魔法少女品质不匹配的情况

  示例:
    - 光元素天赋 + 偏好长剑 + 勇猛使魔 → 光之魔法剑 + 光爆斩
    - 水元素天赋 + 偏好权杖 + 仁慈使魔 → 水之治愈杖 + 群体回复
    - 风元素天赋 + 偏好弓 + 洞察使魔 → 风之魔法弓 + 气息感知

  附注: 武器一旦确定，战斗风格随之定型，不可随意更改

成长体系:
