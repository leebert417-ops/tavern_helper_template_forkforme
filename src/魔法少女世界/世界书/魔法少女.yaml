代价与风险:
  精神消耗: 战斗与变身消耗精神力，过度使用导致精神疲劳、情绪低落
  暗面侵蚀: 长时间接触负面情绪会被暗面污染，逐渐腐蚀内心的希望
  迷失风险: 若在精神空间与使魔走散，将永远沉入潜意识海洋

